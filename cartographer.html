<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>CARTOGRAPHER</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0c;--card:#131315;--raised:#1a1a1d;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --t1:#eeeef2;--t2:#8c8ca8;--t3:#4a4a62;
  --goe:#22c55e;--ose:#3b82f6;--cri:#f97316;--dqi:#a855f7;
  --accent:#6366f1;
  --s:#f59e0b;--e:#3b82f6;--l:#8b5cf6;--sf:#ef4444;
  --r:11px;--nav:62px
}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;font-size:14px}
.screen{display:none;flex-direction:column;min-height:100vh;padding-bottom:calc(var(--nav) + 12px)}
.screen.active{display:flex}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--t3);cursor:pointer;padding:6px 0;transition:color .15s}
.ni.active{color:var(--accent)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ni-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase}

/* TOPBAR */
.topbar{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.logo{font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--accent)}
.ver{font-size:10px;color:var(--t3);font-weight:600}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 12px 8px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:13px 16px;border-radius:var(--r);border:none;font-size:13px;font-weight:700;cursor:pointer;width:100%;letter-spacing:.02em;transition:opacity .15s}
.btn:active{opacity:.65}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--raised);color:var(--t1);border:1px solid var(--border)}
.btn-sm{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer}
.btn-row{display:flex;gap:8px;padding:4px 12px 12px}
.btn-row .btn{flex:1}

/* LOADING / EMPTY */
.spin{width:26px;height:26px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 24px;gap:10px;color:var(--t3);font-size:12px;letter-spacing:.04em}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:5px;text-align:center;color:var(--t3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-t{font-size:15px;font-weight:700;color:var(--t2);margin-bottom:4px}
.empty-d{font-size:12px;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + 10px);left:50%;transform:translateX(-50%);background:var(--raised);border:1px solid var(--border2);color:var(--t1);padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:300;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none;letter-spacing:.02em}
.toast.show{opacity:1}

/* TODAY */
.date-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
.dbtn{background:var(--card);border:1px solid var(--border);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:20px;flex-shrink:0;font-weight:300}
.dlbl{flex:1;text-align:center}
.dlbl-main{font-size:14px;font-weight:700}
.dlbl-sub{font-size:10px;color:var(--t3);margin-top:1px}
.pills{display:flex;overflow-x:auto;padding:8px 12px;gap:5px;scrollbar-width:none;border-bottom:1px solid var(--border)}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .15s}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chips{display:none;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border)}
.chip{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:7px 10px;text-align:center;flex:1}
.chip-v{font-size:19px;font-weight:800;line-height:1}
.chip-l{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}
.lg-grp{padding:7px 16px 2px;font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--t3);text-transform:uppercase}
.fx{padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.fx:active{background:var(--card)}
.fx-teams{flex:1;min-width:0}
.fx-time{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.04em;margin-bottom:3px}
.fx-home{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fx-away{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.fx-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700}
.fx-arrow{font-size:18px;color:var(--t3);flex-shrink:0;font-weight:300}

/* ANALYZE */
.a-hdr{padding:10px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.a-back{background:none;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:0;line-height:1;font-weight:300;flex-shrink:0}
.a-comp{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.07em;margin-bottom:3px}
.a-title{font-size:15px;font-weight:700;line-height:1.3}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 11px;border-top-width:2px}
.sc-lbl{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px}
.sc-val{font-size:32px;font-weight:800;line-height:1;margin-bottom:3px}
.sc-desc{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.03em}
.arch{margin:0 11px 7px;border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:12px}
.arch-ico{font-size:26px;flex-shrink:0}
.arch-type{font-size:9px;font-weight:800;letter-spacing:.1em;color:var(--t3);margin-bottom:3px}
.arch-lbl{font-size:20px;font-weight:800;line-height:1;margin-bottom:3px}
.arch-d{font-size:11px;opacity:.7;line-height:1.4}
.slbl{font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--t3);padding:7px 12px 3px}
.mkts{padding:0 11px;margin-bottom:6px}
.mkt{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;gap:8px}
.mkt-r{font-size:10px;color:var(--t3);min-width:18px;font-weight:700}
.mkt-n{font-size:14px;font-weight:700;flex:1}
.mkt-b{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:800;letter-spacing:.05em}
.conf-row{margin:0 11px 7px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;justify-content:space-between}
.conf-l{font-size:9px;color:var(--t3);font-weight:700;letter-spacing:.05em;margin-bottom:3px}
.conf-v{font-size:16px;font-weight:800}
.warn-box{margin:0 11px 7px;padding:9px 12px;border-radius:9px;font-size:11px;line-height:1.5;font-weight:600}

/* BOARDS */
.btabs{display:flex;overflow-x:auto;padding:9px 11px;gap:5px;scrollbar-width:none;border-bottom:1px solid var(--border)}
.btabs::-webkit-scrollbar{display:none}
.btab{flex-shrink:0;padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:10px;font-weight:800;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:all .15s}
.bcard{margin:0 11px 7px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px}
.bcard-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.bcard-rm{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0;line-height:1;font-weight:300}

/* ECHO */
.echo-item{padding:12px 16px;border-bottom:1px solid var(--border)}
.echo-fx{font-size:14px;font-weight:700;margin-bottom:3px}
.echo-meta{font-size:10px;color:var(--t3);margin-bottom:7px;font-weight:600}
.echo-sp{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.esp{font-size:9px;padding:2px 7px;border-radius:3px;font-weight:800;letter-spacing:.03em}
.rbadge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:6px;letter-spacing:.03em}
.rbadge.win{background:rgba(34,197,94,.15);color:var(--goe)}
.rbadge.loss{background:rgba(239,68,68,.15);color:#ef4444}
.rbadge.pend{background:rgba(99,102,241,.15);color:var(--accent)}
.ri{width:40px;background:var(--raised);border:1px solid var(--border2);border-radius:8px;color:var(--t1);font-size:16px;font-weight:700;text-align:center;padding:7px 4px;outline:none;-moz-appearance:textfield}
.ri::-webkit-outer-spin-button,.ri::-webkit-inner-spin-button{-webkit-appearance:none}

/* STATS */
.stats-sec{padding:11px 11px 0}
.stats-t{font-size:9px;font-weight:800;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;margin-bottom:7px}
.srow{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.srow-l{flex:1;min-width:0}
.srow-n{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.prog{height:3px;background:var(--raised);border-radius:2px;overflow:hidden}
.progf{height:100%;border-radius:2px;transition:width .5s}
.srow-r{text-align:right;flex-shrink:0}
.srow-v{font-size:13px;font-weight:800}
.srow-s{font-size:9px;color:var(--t3);font-weight:600;margin-top:1px}
.cal-badge{font-size:9px;font-weight:800;letter-spacing:.06em;padding:2px 8px;border-radius:4px;margin-left:6px}
</style>
</head>
<body>

<!-- TODAY -->
<div class="screen active" id="s-today">
  <div class="topbar"><span class="logo">CARTOGRAPHER</span><span class="ver">v3.0</span></div>
  <div class="date-row">
    <div class="dbtn" onclick="chDate(-1)">‹</div>
    <div class="dlbl">
      <div class="dlbl-main" id="dlbl">Today</div>
      <div class="dlbl-sub" id="dval"></div>
    </div>
    <div class="dbtn" onclick="chDate(1)">›</div>
  </div>
  <div class="pills" id="lpills"><div class="pill active" onclick="filterL('ALL',this)">ALL</div></div>
  <div class="chips" id="chips">
    <div class="chip"><div class="chip-v" id="c-total">0</div><div class="chip-l">Fixtures</div></div>
    <div class="chip"><div class="chip-v" id="c-done" style="color:var(--goe)">0</div><div class="chip-l">Analyzed</div></div>
    <div class="chip"><div class="chip-v" id="c-req" style="color:var(--dqi)">100</div><div class="chip-l">API Left</div></div>
  </div>
  <div id="today-body"></div>
</div>

<!-- ANALYZE -->
<div class="screen" id="s-analyze">
  <div id="analyze-body">
    <div class="empty"><div class="empty-ico">🔬</div><div class="empty-t">No fixture selected</div><div class="empty-d">Tap a fixture on Today to analyze it</div></div>
  </div>
</div>

<!-- BOARDS -->
<div class="screen" id="s-boards">
  <div class="topbar"><span class="logo">BOARDS</span></div>
  <div class="btabs" id="btabs">
    <div class="btab active" data-b="SENTINEL" onclick="swBoard('SENTINEL',this)">Sentinel</div>
    <div class="btab" data-b="ELITE" onclick="swBoard('ELITE',this)">Elite</div>
    <div class="btab" data-b="LOGIC_CHAIN" onclick="swBoard('LOGIC_CHAIN',this)">Logic Chain</div>
    <div class="btab" data-b="SHADOW_FIRE" onclick="swBoard('SHADOW FIRE',this)">Shadow Fire</div>
  </div>
  <div id="boards-body"></div>
</div>

<!-- ECHO -->
<div class="screen" id="s-echo">
  <div class="topbar"><span class="logo">ECHO</span><span class="ver">Evidence Log</span></div>
  <div id="echo-body"></div>
</div>

<!-- STATS -->
<div class="screen" id="s-stats">
  <div class="topbar"><span class="logo">STATS</span><span class="ver">Calibration</span></div>
  <div id="stats-body"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="ni active" onclick="nav('today',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="ni-lbl">Today</span>
  </button>
  <button class="ni" onclick="nav('analyze',this)">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    <span class="ni-lbl">Analyze</span>
  </button>
  <button class="ni" onclick="nav('boards',this)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="ni-lbl">Boards</span>
  </button>
  <button class="ni" onclick="nav('echo',this)">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span class="ni-lbl">Echo</span>
  </button>
  <button class="ni" onclick="nav('stats',this)">
    <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span class="ni-lbl">Stats</span>
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════
const CFG = {
  KEY: 'aaaf3943f83f469a85a50abee5eacde6',
  BASE: 'https://api.football-data.org/v4',
  LGA: {PL:2.7,BL1:3.1,SA:2.6,FL1:2.6,PD:2.6,CL:2.8,WC:2.5,EC:2.4,ELC:2.5,DED:3.0,PPL:2.5,BSA:2.5},
  LR:  {PL:1.0,BL1:1.0,SA:1.0,FL1:1.0,PD:1.0,CL:1.0,WC:0.9,EC:0.9,ELC:0.8,DED:0.8,PPL:0.75,BSA:0.7},
  HV: ['PL','BL1','FL1','SA','CL'],
  BMAX: {SENTINEL:5,ELITE:8,'LOGIC CHAIN':12,'SHADOW FIRE':10},
  BC: {SENTINEL:'#f59e0b',ELITE:'#3b82f6','LOGIC CHAIN':'#8b5cf6','SHADOW FIRE':'#ef4444',REJECTED:'#4a4a62'}
};

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
const S = {
  dateOff:0, league:'ALL',
  fixtures:[], fxMap:{},
  analyses:{}, curMatch:null,
  curBoard:'SENTINEL',
  boards:{SENTINEL:[],ELITE:[],'LOGIC CHAIN':[],'SHADOW FIRE':[]}
};

// ═══════════════════════════════════════════
// API MODULE
// ═══════════════════════════════════════════
const API = {
  cache:{}, left:100, local:{},
  async loadLocal(file) {
    if (this.local[file]) return this.local[file];
    const r = await fetch(`./data/${file}.json?_=${Date.now()}`);
    if (!r.ok) throw new Error(`Error ${r.status} loading data/${file}.json`);
    const d = await r.json();
    this.local[file] = d;
    return d;
  },
  async day(date) {
    // Data is now pre-fetched server-side via GitHub Actions into data/matches.json
    try {
      const d = await this.loadLocal('matches');
      const all = d.matches || [];
      return { matches: all.filter(m => (m.utcDate||'').slice(0,10) === date) };
    } catch (e) {
      throw new Error('Could not load fixtures data: ' + e.message);
    }
  },
  async team(id) {
    try {
      const d = await this.loadLocal('teams');
      return { matches: d[id] || d[String(id)] || [] };
    } catch (e) { return { matches: [] }; }
  },
  async h2h(id) {
    try {
      const d = await this.loadLocal('h2h');
      return d[id] || d[String(id)] || { matches: [] };
    } catch (e) { return { matches: [] }; }
  },
  async stand(code) {
    try {
      const d = await this.loadLocal('standings');
      return d[code] || { standings: [] };
    } catch (e) { return { standings: [] }; }
  }
};

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
const c01 = v => Math.max(0,Math.min(1,v));

function dateStr(off=0) {
  const d=new Date(); d.setDate(d.getDate()+off);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dateLbl(off) {
  if(off===0) return 'Today';
  if(off===1) return 'Tomorrow';
  if(off===-1) return 'Yesterday';
  const d=new Date(); d.setDate(d.getDate()+off);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}
function fmtTime(utc) { return new Date(utc).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(utc) { return new Date(utc).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'}); }

function toast(msg,ms=2400) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),ms);
}

function criCol(v) { return v>=70?'#ef4444':v>=50?'#f97316':v>=30?'#eab308':'#22c55e'; }
function pct(w,t) { return t>0?Math.round(w/t*100)+'%':'—'; }
function barCol(r) { return r>=75?'var(--goe)':r>=55?'var(--ose)':r>=40?'#eab308':'#ef4444'; }

function calStatus(n) {
  if(n>=2000) return {label:'STABLE',col:'#22c55e'};
  if(n>=500)  return {label:'VALIDATED',col:'#3b82f6'};
  if(n>=100)  return {label:'PROVISIONAL',col:'#f97316'};
  return {label:'EXPERIMENTAL',col:'#ef4444'};
}

// ═══════════════════════════════════════════
// DATA PROCESSING
// ═══════════════════════════════════════════
function procMatches(all, tid, venue) {
  const ms = (all||[]).filter(m => {
    if (m.status!=='FINISHED'||!m.score?.fullTime) return false;
    if (venue==='HOME') return m.homeTeam.id===tid;
    if (venue==='AWAY') return m.awayTeam.id===tid;
    return m.homeTeam.id===tid||m.awayTeam.id===tid;
  }).slice(0,10);
  if (!ms.length) return null;
  let gs=0,gc=0,pts=0,lat=null;
  ms.forEach(m=>{
    const h=m.homeTeam.id===tid;
    gs += h?(m.score.fullTime.home??0):(m.score.fullTime.away??0);
    gc += h?(m.score.fullTime.away??0):(m.score.fullTime.home??0);
    const w=m.score.winner;
    pts += w==='DRAW'?1:(w==='HOME_TEAM')===h?3:0;
    const d=new Date(m.utcDate);
    if(!lat||d>lat) lat=d;
  });
  const n=ms.length;
  return {n,gs:gs/n,gc:gc/n,ppg:pts/n,lat};
}

function procH2H(data) {
  const ms=(data?.matches||[]).filter(m=>m.status==='FINISHED'&&m.score?.fullTime);
  if(!ms.length) return null;
  let tot=0;
  ms.forEach(m=>tot+=(m.score.fullTime.home??0)+(m.score.fullTime.away??0));
  return {n:ms.length,avg:tot/ms.length};
}

function teamPos(standings,tid) {
  for(const s of standings?.standings||[]) {
    if(s.type!=='TOTAL') continue;
    const e=s.table.find(r=>r.team.id===tid);
    if(e) return {pos:e.position,tot:s.table.length};
  }
  return null;
}

function koFactor(stage) {
  const m={FINAL:1.0,THIRD_PLACE:0.9,SEMI_FINALS:0.85,QUARTER_FINALS:0.70,
    LAST_16:0.55,LAST_32:0.40,LAST_64:0.30,PLAYOFFS:0.6,
    GROUP_STAGE:0.25,REGULAR_SEASON:0.0,CLAUSURA:0.0,APERTURA:0.0,CHAMPIONSHIP:0.1};
  return m[stage]??0.2;
}

// ═══════════════════════════════════════════
// ENGINES
// ═══════════════════════════════════════════
function calcDQI(hd, ad, lc, hasH2H) {
  const samp = c01(Math.min(hd?.n||0, ad?.n||0)/10);
  const now = Date.now();
  const ha = hd?.lat?(now-hd.lat)/86400000:60;
  const aa = ad?.lat?(now-ad.lat)/86400000:60;
  const age = (ha+aa)/2;
  const fresh = age<=7?1.0:age<=14?0.85:age<=30?0.65:0.4;
  const lr = CFG.LR[lc]||0.6;
  const comp = hasH2H?1.0:0.75;
  return Math.round(samp*35 + fresh*25 + lr*20 + comp*20);
}

function calcGOE(hHome, aAway, lc, h2h) {
  const lga = CFG.LGA[lc]||2.7;
  const hgs  = hHome?c01(hHome.gs/2.5):0.45;
  const ags  = aAway?c01(aAway.gs/2.0):0.40;
  const hgc  = hHome?c01(hHome.gc/2.5):0.45;
  const agc  = aAway?c01(aAway.gc/2.0):0.45;
  const lgaN = c01(lga/3.5);
  const h2hN = h2h?c01(h2h.avg/4.0):0.50;
  return Math.min(100,Math.round(hgs*25+ags*25+hgc*15+agc*15+lgaN*10+h2hN*10));
}

function calcOSE(hAll, aAll, hPos, aPos) {
  const hppg = hAll?.ppg??1.5;
  const appg = aAll?.ppg??1.5;
  const form = c01((hppg-appg+3)/6);
  const home = 0.65;
  let gap = 0.5;
  if(hPos&&aPos) gap=c01((aPos.pos-hPos.pos+hPos.tot)/(2*hPos.tot));
  const def = hAll?c01(1-hAll.gc/2.5):0.5;
  return Math.min(100,Math.round(form*30+home*20+gap*20+def*15+0.5*15));
}

function calcCRI(lc, stage) {
  const hv = CFG.HV.includes(lc);
  const ko = koFactor(stage);
  return Math.min(100,Math.round(
    (hv?0.35:0.25)*20 + (hv?0.40:0.30)*15 + (hv?0.45:0.28)*25 + 0*15 + ko*15 + 0.40*10
  ));
}

// ═══════════════════════════════════════════
// CLASSIFY
// ═══════════════════════════════════════════
function mkArch(goe,ose,cri) {
  if(cri>=60) return {t:'D',lbl:'CHAOTIC',ico:'⚡',col:'#ef4444',desc:'High variance environment'};
  if(goe>=65&&ose<65) return {t:'A',lbl:'OPEN',ico:'⚽',col:'#22c55e',desc:'Goals likely, outcome uncertain'};
  if(ose>=65) return {t:'B',lbl:'CONTROLLED',ico:'🎯',col:'#3b82f6',desc:'Direction relatively stable'};
  if(goe<55)  return {t:'C',lbl:'CAGEY',ico:'🔒',col:'#8888a0',desc:'Low scoring expected'};
  if(goe>=65) return {t:'A',lbl:'OPEN',ico:'⚽',col:'#22c55e',desc:'Goals likely, outcome uncertain'};
  return {t:'C',lbl:'CAGEY',ico:'🔒',col:'#8888a0',desc:'Low scoring expected'};
}

function mkMarkets(goe,arch) {
  if(arch.t==='D') return {p:'Over 1.5',s:'BTTS',tt:'Over 2.5',av:'Winner markets'};
  if(arch.t==='A') return goe>=80
    ?{p:'Over 1.5',s:'Over 2.5',tt:'BTTS',av:null}
    :{p:'Over 1.5',s:'BTTS',tt:'Over 2.5',av:null};
  if(arch.t==='B') return {p:'Double Chance',s:'Draw No Bet',tt:'AH 0',av:null};
  return {p:'Under 2.5',s:'Under 3.5',tt:'BTTS No',av:null};
}

function mkConf(goe,ose,arch) {
  const score = arch.t==='B'?ose:arch.t==='C'?(100-goe):goe;
  if(score>=85) return {band:'Elite',col:'#22c55e',score};
  if(score>=75) return {band:'Strong',col:'#3b82f6',score};
  if(score>=65) return {band:'Stable',col:'#a855f7',score};
  if(score>=55) return {band:'Speculative',col:'#f97316',score};
  return {band:'Reject',col:'#ef4444',score};
}

function mkBoard(goe,ose,cri,dqi) {
  if(dqi<50)               return 'REJECTED';
  if(dqi>=80&&ose>=75&&cri<=35) return 'SENTINEL';
  if(dqi>=65&&(goe>=65||ose>=65)&&cri<=55) return 'ELITE';
  if(cri>=60||ose<50)      return 'SHADOW FIRE';
  if(dqi>=55&&cri<=65)     return 'LOGIC CHAIN';
  return 'SHADOW FIRE';
}

// ═══════════════════════════════════════════
// ECHO
// ═══════════════════════════════════════════
const ECHO = {
  K:'carto_echo_v3',
  load() { try{return JSON.parse(localStorage.getItem(this.K)||'[]');}catch{return [];} },
  save(r) {
    const logs=this.load();
    const i=logs.findIndex(l=>l.mid===r.mid);
    if(i>=0) logs[i]={...logs[i],...r}; else logs.unshift({...r,savedAt:Date.now()});
    localStorage.setItem(this.K,JSON.stringify(logs));
  },
  settle(mid,hs,as_) {
    const logs=this.load();
    const i=logs.findIndex(l=>l.mid===mid);
    if(i<0) return null;
    const l=logs[i]; const tot=hs+as_;
    let ok=null;
    switch(l.pm) {
      case 'Over 1.5': ok=tot>=2; break;
      case 'Over 2.5': ok=tot>=3; break;
      case 'Over 3.5': ok=tot>=4; break;
      case 'Under 2.5': ok=tot<3; break;
      case 'Under 3.5': ok=tot<4; break;
      case 'BTTS': ok=hs>0&&as_>0; break;
      case 'BTTS No': ok=hs===0||as_===0; break;
      default: ok=null;
    }
    logs[i]={...l,result:`${hs}–${as_}`,ok,settled:Date.now()};
    localStorage.setItem(this.K,JSON.stringify(logs));
    return ok;
  },
  stats() {
    const settled=this.load().filter(l=>l.ok!==null&&l.ok!==undefined);
    const mkts={},legs={},bds={};
    const goeR={'80+':[0,0],'65–79':[0,0],'50–64':[0,0],'<50':[0,0]};
    settled.forEach(l=>{
      [[mkts,l.pm],[legs,l.lc],[bds,l.bd]].forEach(([o,k])=>{
        if(!k) return; if(!o[k]) o[k]=[0,0]; o[k][1]++; if(l.ok) o[k][0]++;
      });
      const rng=l.goe>=80?'80+':l.goe>=65?'65–79':l.goe>=50?'50–64':'<50';
      goeR[rng][1]++; if(l.ok) goeR[rng][0]++;
    });
    return {mkts,legs,bds,goeR,total:settled.length};
  }
};

async function analyze(fx) {
  S.curMatch = fx.id;
  nav('analyze');

  document.getElementById('analyze-body').innerHTML = `
    <div class="a-hdr">
      <button class="a-back" onclick="nav('today')">‹</button>
      <div>
        <div class="a-comp">${(fx.competition.name||fx.competition.code||'').toUpperCase()}</div>
        <div class="a-title">${fx.homeTeam.name} vs ${fx.awayTeam.name}</div>
      </div>
    </div>
    <div class="loading"><div class="spin"></div><div>Fetching team data…</div></div>`;

  try {
    const [hm,am,h2hD] = await Promise.all([
      API.team(fx.homeTeam.id),
      API.team(fx.awayTeam.id),
      API.h2h(fx.id)
    ]);

    let hPos=null, aPos=null;
    try {
      const st=await API.stand(fx.competition.code);
      hPos=teamPos(st,fx.homeTeam.id);
      aPos=teamPos(st,fx.awayTeam.id);
    } catch(_) {}

    const hHome = procMatches(hm.matches,fx.homeTeam.id,'HOME');
    const aAway = procMatches(am.matches,fx.awayTeam.id,'AWAY');
    const hAll  = procMatches(hm.matches,fx.homeTeam.id,null);
    const aAll  = procMatches(am.matches,fx.awayTeam.id,null);
    const h2h   = procH2H(h2hD);

    const lc  = fx.competition.code;
    const dqi = calcDQI(hHome||hAll, aAway||aAll, lc, !!h2h);
    const goe = calcGOE(hHome, aAway, lc, h2h);
    const ose = calcOSE(hAll, aAll, hPos, aPos);
    const cri = calcCRI(lc, fx.stage);

    const arch = mkArch(goe,ose,cri);
    const mkt  = mkMarkets(goe,arch);
    const conf = mkConf(goe,ose,arch);
    const bd   = mkBoard(goe,ose,cri,dqi);

    const res = {
      mid:fx.id,
      homeTeam:fx.homeTeam.name, awayTeam:fx.awayTeam.name,
      date:fx.utcDate, lc, ln:fx.competition.name||lc,
      dqi,goe,ose,cri,
      at:arch.t,al:arch.lbl,ai:arch.ico,ac:arch.col,ad:arch.desc,
      pm:mkt.p, sm:mkt.s, tm:mkt.tt, av:mkt.av,
      cb:conf.band, cc:conf.col, bd
    };

    S.analyses[fx.id] = res;
    renderAnalysis(res);
    renderTodayList(S.fixtures); // refresh mini-tags

  } catch(e) {
    document.getElementById('analyze-body').innerHTML = `
      <div class="a-hdr">
        <button class="a-back" onclick="nav('today')">‹</button>
        <div>
          <div class="a-comp">ANALYSIS FAILED</div>
          <div class="a-title">${fx.homeTeam.name} vs ${fx.awayTeam.name}</div>
        </div>
      </div>
      <div style="padding:32px 16px;text-align:center">
        <div style="font-size:36px;margin-bottom:10px">⚠️</div>
        <div style="color:#ef4444;font-size:13px;margin-bottom:8px;line-height:1.5">${e.message}</div>
        <div style="font-size:11px;color:var(--t3);margin-bottom:20px">Check your internet connection and try again</div>
        <button class="btn btn-s" style="display:inline-flex;width:auto;padding:10px 20px" onclick="analyze(S.fxMap[${fx.id}])">Retry</button>
      </div>`;
  }
}

  document.getElementById('c-total').textContent = fxs.length;

    document.getElementById('today-body').innerHTML=`<div class="empty"><div class="empty-ico">🗓️</div><div class="empty-t">No fixtures</div><div class="empty-d">No matches scheduled for this selection</div></div>`;

  const grps={};

    const k=f.competition.code;

  const r=S.analyses[S.curMatch]; if(!r) return;
  if(r.bd==='REJECTED') { toast('⚠️ DQI too low — rejected'); return; }
  const b=S.boards[r.bd]; const max=CFG.BMAX[r.bd]||10;
  if(b.find(x=>x.mid===r.mid)) { toast('Already on this board'); return; }

  b.push(r); saveBoards(); toast(`Added to ${r.bd} ✓`);

        <div style="text-align:right">
          <div style="font-size:12px;font-weight:700;color:${r.ac}">${r.ai} ${r.al}</div>
          <div style="font-size:11px;font-weight:700;color:${r.cc};margin-top:2px">${r.cb}</div>
        </div>
      </div>
    </div>`;
  });
  html+=`<div style="padding:0 12px 16px"><button class="btn btn-s" onclick="clrBoard()">Clear Board</button></div>`;
  el.innerHTML=html;
}

function rmBoard(i) {
  S.boards[S.curBoard].splice(i,1);
  saveBoards(); renderBoards(); toast('Removed');
}
function clrBoard() {
  if(!confirm(`Clear ${S.curBoard}?`)) return;
  S.boards[S.curBoard]=[]; saveBoards(); renderBoards();
}

// ═══════════════════════════════════════════
// ECHO RENDER
// ═══════════════════════════════════════════
function renderEcho() {
  const logs=ECHO.load();
  const el=document.getElementById('echo-body');
  if(!logs.length) {
    el.innerHTML=`<div class="empty"><div class="empty-ico">📊</div><div class="empty-t">Echo is empty</div><div class="empty-d">Log analyses to track performance over time</div></div>`;
    return;
  }
  let html=`<div style="padding:6px 16px 3px;font-size:10px;color:var(--t3);font-weight:600">${logs.length} prediction${logs.length!==1?'s':''}</div>`;
  logs.forEach(l=>{
    const pend=l.result===undefined||l.result===null;
    const rb = pend
      ?`<span class="rbadge pend">PENDING</span>`
      :l.ok===true?`<span class="rbadge win">✓ WIN · ${l.result}</span>`
      :l.ok===false?`<span class="rbadge loss">✗ LOSS · ${l.result}</span>`
      :`<span class="rbadge pend">MANUAL · ${l.result}</span>`;
    html+=`<div class="echo-item">
      <div class="echo-fx">${l.homeTeam} vs ${l.awayTeam}</div>
      <div class="echo-meta">${fmtDate(l.date)} · ${l.ln||l.lc} · ${l.bd}</div>
      <div class="echo-sp">
        <span class="esp" style="background:var(--goe)1a;color:var(--goe)">GOE ${l.goe}</span>
        <span class="esp" style="background:var(--ose)1a;color:var(--ose)">OSE ${l.ose}</span>
        <span class="esp" style="background:${criCol(l.cri)}1a;color:${criCol(l.cri)}">CRI ${l.cri}</span>
        <span class="esp" style="background:var(--dqi)1a;color:var(--dqi)">DQI ${l.dqi}</span>
      </div>
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">${l.ai||''} ${l.pm} <span style="font-size:10px;color:${l.cc||'var(--t3)'}">· ${l.cb}</span></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        ${rb}
        ${pend?`<div style="display:flex;align-items:center;gap:5px">
          <input class="ri" type="number" min="0" max="20" placeholder="H" id="h${l.mid}">
          <span style="color:var(--t3);font-weight:800;font-size:13px">–</span>
          <input class="ri" type="number" min="0" max="20" placeholder="A" id="a${l.mid}">
          <button class="btn-sm btn-p" onclick="settle(${l.mid})">✓</button>
        </div>`:''}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function settle(mid) {
  const hEl=document.getElementById('h'+mid);
  const aEl=document.getElementById('a'+mid);
  const hv=hEl?.value.trim(); const av=aEl?.value.trim();
  if(hv===''||av==='') { toast('Enter both scores'); return; }
  const h=parseInt(hv,10); const a=parseInt(av,10);
  if(isNaN(h)||isNaN(a)||h<0||a<0) { toast('Invalid scores'); return; }
  const ok=ECHO.settle(mid,h,a);
  toast(ok===true?'✓ WIN recorded':ok===false?'✗ LOSS recorded':'Result saved (manual market — check result)');
  renderEcho();
}

// ═══════════════════════════════════════════
// STATS RENDER
// ═══════════════════════════════════════════
function renderStats() {
  const st=ECHO.stats();
  const el=document.getElementById('stats-body');
  if(!st.total) {
    el.innerHTML=`<div class="empty"><div class="empty-ico">📈</div><div class="empty-t">No data yet</div><div class="empty-d">Settle predictions in Echo to see calibration stats</div></div>`;
    return;
  }
  const cs=calStatus(st.total);

  function srow(name,w,t,col) {
    const r=t>0?Math.round(w/t*100):0;
    const c=col||barCol(r);
    return `<div class="srow">
      <div class="srow-l">
        <div class="srow-n">${name}</div>
        <div class="prog"><div class="progf" style="width:${t>0?r:0}%;background:${c}"></div></div>
      </div>
      <div class="srow-r">
        <div class="srow-v">${pct(w,t)}</div>
        <div class="srow-s">${w}/${t}</div>
      </div>
    </div>`;
  }

  let html=`<div style="padding:14px 16px 4px;display:flex;align-items:flex-end;justify-content:space-between">
    <div>
      <div style="font-size:32px;font-weight:800;line-height:1">${st.total}</div>
      <div style="font-size:10px;color:var(--t3);font-weight:600;margin-top:3px">Settled predictions</div>
    </div>
    <span class="cal-badge" style="background:${cs.col}18;color:${cs.col};border:1px solid ${cs.col}30">${cs.label}</span>
  </div>`;

  html+=`<div class="stats-sec"><div class="stats-t">GOE Calibration (O1.5 focus)</div>`;
  Object.entries(st.goeR).forEach(([rng,[w,t]])=>{ html+=srow(`GOE ${rng}`,w,t,null); });
  html+=`</div>`;

  if(Object.keys(st.mkts).length) {
    html+=`<div class="stats-sec"><div class="stats-t">Market Performance</div>`;
    Object.entries(st.mkts).sort((a,b)=>b[1][1]-a[1][1]).forEach(([m,[w,t]])=>{ html+=srow(m,w,t,null); });
    html+=`</div>`;
  }

  if(Object.keys(st.bds).length) {
    html+=`<div class="stats-sec"><div class="stats-t">Board Performance</div>`;
    Object.entries(st.bds).forEach(([b,[w,t]])=>{ html+=srow(b,w,t,CFG.BC[b]||'var(--accent)'); });
    html+=`</div>`;
  }

  if(Object.keys(st.legs).length) {
    html+=`<div class="stats-sec" style="margin-bottom:24px"><div class="stats-t">League Performance</div>`;
    Object.entries(st.legs).sort((a,b)=>b[1][1]-a[1][1]).forEach(([lg,[w,t]])=>{ html+=srow(lg,w,t,null); });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function nav(screen, el) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`s-${screen}`).classList.add('active');
  const items=document.querySelectorAll('.ni');
  const idx=['today','analyze','boards','echo','stats'].indexOf(screen);
  items.forEach((n,i)=>n.classList.toggle('active',i===idx));

  if(screen==='analyze') {
    if(S.curMatch&&S.analyses[S.curMatch]) renderAnalysis(S.analyses[S.curMatch]);
    else if(!el) {
      document.getElementById('analyze-body').innerHTML=`<div class="empty"><div class="empty-ico">🔬</div><div class="empty-t">No fixture selected</div><div class="empty-d">Go to Today and tap a fixture to analyze it</div></div>`;
    }
  }
  if(screen==='boards') renderBoards();
  if(screen==='echo')   renderEcho();
  if(screen==='stats')  renderStats();
}

// ═══════════════════════════════════════════
loadBoards();
loadToday();

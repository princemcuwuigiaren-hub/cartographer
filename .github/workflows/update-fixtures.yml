name: Update Fixtures Data

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: {}  # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch fixtures from football-data.org
        env:
          API_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          mkdir -p data
          TODAY=$(date -u +%Y-%m-%d)
          TOMORROW=$(date -u -d "+1 day" +%Y-%m-%d)
          YESTERDAY=$(date -u -d "-1 day" +%Y-%m-%d)

          curl -s -G "https://api.football-data.org/v4/matches" \
            -H "X-Auth-Token: ${API_TOKEN}" \
            --data-urlencode "dateFrom=${YESTERDAY}" \
            --data-urlencode "dateTo=${TOMORROW}" \
            --data-urlencode "competitions=WC,CL,PL,BL1,SA,FL1,PD,ELC,DED,PPL,BSA,EC" \
            -o data/matches.json

          echo "{\"updatedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data/meta.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/meta.json
          git diff --quiet --cached || git commit -m "Update fixtures data [skip ci]"
          git push
          
